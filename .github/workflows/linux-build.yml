name: Linux compile proof

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Raylib build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libgl1-mesa-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Run regression suite
        run: go test ./...

      - name: Build Linux compile proof
        run: go build -trimpath -o build/JohnnyCastaway-linux-amd64 .

      - name: Inspect binary
        run: |
          file build/JohnnyCastaway-linux-amd64
          go version -m build/JohnnyCastaway-linux-amd64

      - name: Upload compile proof
        uses: actions/upload-artifact@v7
        with:
          name: JohnnyCastaway-Linux-compile-proof
          path: build/JohnnyCastaway-linux-amd64
          if-no-files-found: error
          retention-days: 7
