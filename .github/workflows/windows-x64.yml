name: Windows 11 x64

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW64
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Run regression suite
        shell: cmd
        env:
          MSYS2_ROOT: ${{ steps.msys2.outputs.msys2-location }}
        run: build\test.bat

      - name: Build native Windows 11 x64 application and screensaver
        shell: cmd
        env:
          MSYS2_ROOT: ${{ steps.msys2.outputs.msys2-location }}
        run: build\build.bat

      - name: Verify build architecture
        shell: pwsh
        run: |
          foreach ($artifact in @('build\JohnnyCastaway.exe', 'build\JohnnyCastaway.scr')) {
            $output = & go version -m $artifact 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0 -or $output -notmatch 'GOOS=windows' -or $output -notmatch 'GOARCH=amd64') {
              throw "Unexpected metadata for ${artifact}:`n$output"
            }
            $output
          }

      - name: Upload native x64 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: JohnnyCastaway-Windows-11-x64
          path: |
            build/JohnnyCastaway.exe
            build/JohnnyCastaway.scr
          if-no-files-found: error
          retention-days: 14
