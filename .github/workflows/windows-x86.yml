name: Windows x86 screensaver

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW32
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          install: mingw-w64-i686-gcc

      - name: Build and test Windows x86 screensaver
        shell: cmd
        env:
          MSYS2_ROOT: ${{ steps.msys2.outputs.msys2-location }}
        run: build\build_x86.bat

      - name: Verify build architecture
        shell: pwsh
        run: |
          $output = & go version -m build\JohnnyCastaway-x86.scr 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0 -or $output -notmatch 'GOOS=windows' -or $output -notmatch 'GOARCH=386') {
            throw "Unexpected screensaver metadata:`n$output"
          }
          $output

      - name: Upload screensaver
        uses: actions/upload-artifact@v7
        with:
          name: JohnnyCastaway-Windows-x86-Screensaver
          path: build/JohnnyCastaway-x86.scr
          if-no-files-found: error
          retention-days: 14
